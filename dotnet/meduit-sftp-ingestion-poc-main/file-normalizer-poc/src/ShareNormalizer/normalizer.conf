# OPTIONAL config for ShareNormalizer.exe (plain key=value; lists are comma-separated).
# The exe runs fine with NO config file - everything here has a baked-in default, and the
# command-line args (--source, --out, --filelist, --min-year, --dry-run, --input-only, --loop)
# override these. If you ship this file, put it in the SAME folder as the exe (or pass --config <path>).

# -------------------------------------------------------------------------------------------------
# Source roots to crawl. We scan ONLY these (MCD1/MCD2/MCD3) - BOPC and the rest are out of scope.
# The system is the top folder, so we point straight at it and pin it: SYSTEM=path. Semicolon list.
# (Pinning the system means it does not depend on detecting the folder, which is now the root.)
sources=MCD1=C:\Users\thameem.ansari\Downloads\NewBusinessProcessing\FCS;MCD2=C:\Users\thameem.ansari\Downloads\NewBusinessProcessing\IMC;MCD3=C:\Users\thameem.ansari\Downloads\NewBusinessProcessing\ABS

# Where the normalized tree, inventory and log are written. Required.
outputRoot=C:\Users\thameem.ansari\OneDrive - psiog.com\Documents\Meduit\normalized

# Path to FILE_LIST.xlsx - the source of client + enable enrichment. Blank = look beside the exe.
fileListPath=FILE_LIST.xlsx

# Only keep files whose Date Modified year is this or later (0 = no filter). Also the target year:
# see yearSource below.
minYear=2026

# How the yyyy-MM bucket is decided:
#   modified = bucket by the file's Date Modified. The name and folder are ignored - EXCEPT that if
#              the filename or a folder names a year different from minYear, the YEAR defaults to
#              minYear. So a stray 2020 / 2027 / 2028 (or a misread number) in a name or folder can
#              never make a wrong-year folder; everything modified in 2026 lands under 2026-<month>.
#   filename = a date in the filename wins, else Date Modified (legacy).
yearSource=modified

# When matching a folder to a workbook client, also allow a substring ("contains") match, not just
# exact - real folders carry extra suffixes/codes (e.g. disk "ADVANCED RADIOLOGY" -> "ADVANCED RAD").
clientMatchContains=true

# In-flight working folders that must NOT be touched (per the customer: "to process" holds
# files mid-flight). Any file whose path contains one of these folder names is skipped.
skipFolderNames=to process,2 process,in process,in-process,inflight,working,temp

# Filename markers that suggest a legacy OUTPUT/ack file (Kind=OUTPUT_CANDIDATE). Hint only.
outputFileMarkers=ack,acknowledg,_out,output,reject,error,_err,response,confirm,receipt,result, import

# ACCEPTABLE file formats - extensions treated as data files when flagging input candidates (a hint
# for the Kind column; only enforced as a hard filter when inputCandidatesOnly=true).
dataExtensions=.txt,.csv,.dat,.pde,.prn,.xlsx,.xls,.fixed,.asc, .cnb, .clm, .xlsm, .fore, .hill, .hl7, .MTRO, .xml, .r1, .r3, .r19, .tsv, .dlm

# NON-ACCEPTABLE files - patterns that are NEVER copied (acknowledgment / message / output files).
# The counterpart to dataExtensions: list whole formats (.msg, .pdf) and/or suffixes (.ack.txt,
# _ack.txt). A plain pattern matches as a case-insensitive SUFFIX; a pattern with '*' is a wildcard
# over the whole name (e.g. *ack*). Leave blank to exclude nothing. These show as SKIPPED_EXCLUDED.
excludeFilePatterns=.ack.txt,_ack.txt,.msg,.zip, .gz

# Tokens used to detect the system from the folder path (fallback only; the pinned roots above win).
systemTokens=MCD1,MCD2,MCD3,BOPC

# false = copy files; true = scan + inventory only.
dryRun=false
# false = copy everything (inventory flags Kind); true = copy only INPUT_CANDIDATE files.
inputCandidatesOnly=false
# 0 = run once and exit; >0 = re-scan every N seconds.
loopSeconds=0


